<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whelm — Playtesting</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f0eb;
    color: #3d3833;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  h1 {
    font-size: 28px;
    font-weight: 300;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }

  .subtitle {
    font-size: 15px;
    font-weight: 300;
    color: #6b6158;
    margin-bottom: 40px;
  }

  .prototypes {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 320px;
  }

  .prototypes a {
    display: block;
    padding: 16px 20px;
    background: rgba(92, 79, 107, 0.04);
    border: 1px solid rgba(92, 79, 107, 0.15);
    border-radius: 14px;
    color: #5c4f6b;
    text-decoration: none;
    font-size: 16px;
    font-weight: 400;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .prototypes a:hover {
    background: rgba(92, 79, 107, 0.08);
    border-color: rgba(92, 79, 107, 0.3);
  }

  .prototypes .description {
    display: block;
    font-size: 13px;
    font-weight: 300;
    color: #968d84;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <h1>whelm</h1>
  <p class="subtitle">playtest prototypes</p>
  <ul class="prototypes">
    <li>
      <a href="void-rain/">
        Void Rain
        <span class="description">Brain dump — pour it out, see what stays</span>
      </a>
    </li>
  </ul>
</body>
</html>
